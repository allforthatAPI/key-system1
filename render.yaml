services:
  - type: web
    name: saturn-keysystem
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: saturn-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: KEY_SIGNING_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production

databases:
  - name: saturn-db
    plan: free
